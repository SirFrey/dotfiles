set -g default-terminal 'tmux-256color'
set -as terminal-overrides ',xterm*:Tc:sitm=\E[3m'

# Forward extended keys (Shift+Enter, Ctrl+Enter, etc.) through tmux.
# Required for Claude Code's /terminal-setup Shift+Enter binding to work inside tmux.
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
# unbind C-b
# set -g prefix C-Space
# bind C-Space send-prefix

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R

set -g mouse on

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"


# Ring the bell if any background window rang a bell
set -g bell-action any

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Swap panes
bind -r H swap-pane -U
bind -r L swap-pane -D

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tmux-yank'
# Recover sessions
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'

# Catppuccin: minimalist + transparent
# Reset prior status options so re-sourcing applies cleanly
set -g status-position top
set -g status-bg default
set -g status-fg default
set -gu status-style
set -gu status-left-style
set -gu status-right-style
set -gu window-status-style
set -gu window-status-current-style
set -gu window-status-format
set -gu window-status-current-format

set -g @catppuccin_flavor 'frappe'
set -g @catppuccin_status_background 'none'
set -g @catppuccin_window_status_style 'none'

run '~/.config/tmux/plugins/tmux/catppuccin.tmux'
run '~/.tmux/plugins/tpm/tpm'

set -g status-right ''
set -gF status-style 'bg=default'

# Status-left: terminal icon + session name in green, then a `|` separator.
set -g status-left '#[bold,fg=#{?client_prefix,#{@thm_red},#{@thm_green}}]     #S #[default]| '
set -g status-left-length 60

# Window list: drop tmux's #F flags (no `-` last-window mark, no `*`).
# Per-window override: set @window_color on a window to a hex (e.g. "#a6d189")
# and both inactive and current rendering use it; otherwise mauve fallback.
set -gF @_w_cur_fallback '#{@thm_peach}'
set -gF @_w_inactive_fallback '#{@thm_lavender}'
set -g window-status-format         '#[fg=#{?@window_color,#{@window_color},#{@_w_inactive_fallback}}] #I #W '
set -g window-status-current-format '#[bold,underscore,fg=#{?@window_color,#{@window_color},#{@_w_cur_fallback}}] #I #W #[nobold,nounderscore,default]'
set -g window-status-separator ''

# Quick window-color picker: prefix + C-w then one letter.
bind C-w switch-client -T window-color
bind -T window-color g set -w @window_color "#a6d189"
bind -T window-color r set -w @window_color "#e78284"
bind -T window-color y set -w @window_color "#e5c890"
bind -T window-color b set -w @window_color "#8caaee"
bind -T window-color m set -w @window_color "#ca9ee6"
bind -T window-color p set -w @window_color "#ef9f76"
bind -T window-color t set -w @window_color "#81c8be"
bind -T window-color l set -w @window_color "#babbf1"
bind -T window-color k set -w @window_color "#f4b8e4"
bind -T window-color s set -w @window_color "#99d1db"
bind -T window-color u set -uw @window_color

# set vi-mode
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind-key -r f run-shell "tmux neww ~/.local/scripts/tmux-sessionizer"

