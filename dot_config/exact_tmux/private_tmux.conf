set -g default-terminal 'tmux-256color'
set -as terminal-overrides ',xterm*:Tc:sitm=\E[3m'

set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
# unbind C-b
# set -g prefix C-Space
# bind C-Space send-prefix

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R

set -g mouse on

# QoL
set -g history-limit 50000
set -g focus-events on
set -sg escape-time 0
setw -g aggressive-resize on

# Activity monitoring disabled: focus-events trigger prompt redraws that
# would otherwise flag every window switch. Bell flag (!) still works.
set -g monitor-activity off
set -g visual-activity off

# OSC52 system clipboard (works through nested/SSH tmux)
set -g set-clipboard on

# Longer popup time for prefix+q pane picker and display-message
set -g display-panes-time 2000
set -g display-time 2000

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"


# Bell: flag the window in the status line, no audible ring, no popup.
setw -g monitor-bell on
set -g visual-bell off
set -g bell-action any

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Swap panes
bind -r H swap-pane -U
bind -r L swap-pane -D

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tmux-yank'
# Recover sessions
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# fzf-pick words/paths/urls from pane scrollback (prefix + Tab)
set -g @plugin 'laktak/extrakto'
# Vimium-style on-screen hint copy (prefix + F)
set -g @plugin 'fcsonline/tmux-thumbs'
# Fuzzy session/window/pane picker in popup (prefix + C-f)
set -g @plugin 'sainnhe/tmux-fzf'

set -g @continuum-restore 'on'
set -g @extrakto_default_opt 'word'
set -g @extrakto_split_size 12
set -g @extrakto_grab_area 'window recent'
set -g @extrakto_open_tool 'wslview'

# tmux-thumbs: hints overlay
set -g @thumbs-key F
set -g @thumbs-alphabet qwerty-homerow
set -g @thumbs-reverse enabled
set -g @thumbs-unique enabled
set -g @thumbs-contrast 1

# tmux-fzf: popup launcher
TMUX_FZF_LAUNCH_KEY="C-f"
TMUX_FZF_OPTIONS="-p -w 70% -h 70% -m"

# Catppuccin: minimalist + transparent
# Reset prior status options so re-sourcing applies cleanly
set -g status-position top
set -g status-bg default
set -g status-fg default
set -gu status-style
set -gu status-left-style
set -gu status-right-style
set -gu window-status-style
set -gu window-status-current-style
set -gu window-status-format
set -gu window-status-current-format

set -g @catppuccin_flavor 'frappe'
set -g @catppuccin_status_background 'none'
set -g @catppuccin_window_status_style 'none'

run '~/.config/tmux/plugins/tmux/catppuccin.tmux'
run '~/.tmux/plugins/tpm/tpm'

set -g status-right '#[fg=#{@thm_yellow}]#{?window_zoomed_flag,  ZOOM ,}#[fg=#{@thm_red}]#{?pane_synchronized,  SYNC ,}#[fg=#{@thm_sky}]#{?pane_in_mode,  COPY ,}#[fg=#{@thm_overlay_1}] %H:%M '
set -g status-right-length 60
set -gF status-style 'bg=default'

# Status-left: terminal icon + session name in green, then a `|` separator.
set -g status-left '#[bold,fg=#{?client_prefix,#{@thm_red},#{@thm_green}}]     #S #[default]| '
set -g status-left-length 60

# Window list: drop tmux's #F flags (no `-` last-window mark, no `*`).
# Per-window override: set @window_color on a window to a hex (e.g. "#a6d189")
# and both inactive and current rendering use it; otherwise mauve fallback.
set -gF @_w_cur_fallback '#{@thm_peach}'
set -gF @_w_inactive_fallback '#{@thm_lavender}'
set -g window-status-format         '#[fg=#{?@window_color,#{@window_color},#{@_w_inactive_fallback}}] #I #W#{?window_bell_flag,!,}#{?window_zoomed_flag, Z,} '
set -g window-status-current-format '#[bold,underscore,fg=#{?@window_color,#{@window_color},#{@_w_cur_fallback}}] #I #W#{?window_zoomed_flag, Z,} #[nobold,nounderscore,default]'
set -g window-status-separator ''

# Pane borders: colored active border, no status row (saves a line of height).
set -g pane-border-status off
set -gF pane-border-style 'fg=#{@thm_surface_2}'
set -gF pane-active-border-style 'fg=#{@thm_peach}'

# Quick window-color picker: prefix + C-w then one letter.
bind C-w switch-client -T window-color
bind -T window-color g set -w @window_color "#a6d189"
bind -T window-color r set -w @window_color "#e78284"
bind -T window-color y set -w @window_color "#e5c890"
bind -T window-color b set -w @window_color "#8caaee"
bind -T window-color m set -w @window_color "#ca9ee6"
bind -T window-color p set -w @window_color "#ef9f76"
bind -T window-color t set -w @window_color "#81c8be"
bind -T window-color l set -w @window_color "#babbf1"
bind -T window-color k set -w @window_color "#f4b8e4"
bind -T window-color s set -w @window_color "#99d1db"
bind -T window-color u set -uw @window_color

# set vi-mode
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind-key -r f run-shell "tmux neww ~/.local/scripts/tmux-sessionizer"

# Promote pane to background window / pull window back as pane
bind b break-pane -d
bind C-b choose-window 'join-pane -h -s "%%"'

# Toggle pane synchronization (type once, run in all panes of current window)
bind e setw synchronize-panes \; display-message "sync-panes toggled"

# Jump between live sessions (zoomed tree, sessions only)
bind g choose-tree -Zs

# Floating scratchpad: persistent hidden session, toggle in centered popup.
# Alt-` (no prefix) opens/hides; state persists across toggles.
bind -n "M-\`" if-shell -F '#{==:#{session_name},scratch}' \
  { detach-client } \
  { display-popup -E -w 85% -h 80% -d "#{pane_current_path}" "tmux new-session -A -s scratch" }
# Same thing via prefix + ` for muscle memory.
bind '`' if-shell -F '#{==:#{session_name},scratch}' \
  { detach-client } \
  { display-popup -E -w 85% -h 80% -d "#{pane_current_path}" "tmux new-session -A -s scratch" }

# F12: nested-tmux passthrough. Outer tmux drops its prefix + key-table so
# an inner tmux (e.g. SSH'd remote) receives all keys. F12 again to restore.
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set -g status-style 'bg=colour238,fg=colour245' \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  display-message "tmux OFF — F12 to restore" \;\
  refresh-client -S
bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -gu status-style \;\
  set -gF status-style 'bg=default' \;\
  display-message "tmux ON" \;\
  refresh-client -S

